name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-manifest:
    name: Build manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:manifest:ci
